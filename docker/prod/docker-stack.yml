services:
  app:
    image: ${DOCKER_REGISTRY}/${APP_NAME}:${APP_TAG}
    env_file: .env.prod
    ports:
      - target: 8080
        published: 80
        protocol: tcp
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/up"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      mode: replicated
      replicas: 2
      update_config:
        parallelism: 1
        monitor: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        order: start-first
      restart_policy:
        condition: any
        delay: 5s
        window: 120s
