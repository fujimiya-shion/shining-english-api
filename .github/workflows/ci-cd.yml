name: CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  REGISTRY: fujimiyashion
  IMAGE_NAME: shining-english-api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Run tests
        run: ./gradlew test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install Ansible
        run: pip install ansible

      - name: Decrypt DockerHub credentials from vault
        id: dockerhub
        env:
          VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          echo "$VAULT_PASS" > .vault_pass
          DECRYPTED=$(ansible-vault view deploy/ansible/inventory/group_vars/vault_dockerhub.yml --vault-password-file .vault_pass)
          USERNAME=$(echo "$DECRYPTED" | sed -n 's/^vault_dockerhub_username:[[:space:]]*//p')
          TOKEN=$(echo "$DECRYPTED" | sed -n 's/^vault_dockerhub_token:[[:space:]]*//p')
          echo "username=$USERNAME" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> "$GITHUB_OUTPUT"

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ steps.dockerhub.outputs.username }}
          password: ${{ steps.dockerhub.outputs.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-,format=short,enable=${{ github.ref_name == 'main' }}
            type=semver,pattern={{version}},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/prod/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible
        run: pip install ansible

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Write vault password
        env:
          VAULT_PASS: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: echo "$VAULT_PASS" > deploy/ansible/.vault_pass

      - name: Write production inventory
        env:
          INVENTORY: ${{ secrets.ANSIBLE_INVENTORY }}
        run: echo "$INVENTORY" > deploy/ansible/inventory/production.yml

      - name: Run deploy script
        run: bash deploy/scripts/deploy.sh "${{ github.ref_name }}"
