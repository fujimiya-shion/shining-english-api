<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"/></head>
<body style="font-family: Arial, sans-serif; padding: 20px;">
  <h2>Đặt lại mật khẩu</h2>
  <p>Bạn đã yêu cầu đặt lại mật khẩu cho tài khoản <strong th:text="${email}"></strong>.</p>
  <p>Nhấn vào liên kết bên dưới để đặt lại mật khẩu:</p>
  <p><a th:href="${resetUrl}" style="background: #f2a900; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 5px;">Đặt lại mật khẩu</a></p>
  <p>Liên kết này sẽ hết hạn sau 60 phút.</p>
  <p>Nếu bạn không yêu cầu đặt lại mật khẩu, vui lòng bỏ qua email này.</p>
</body>
</html>
