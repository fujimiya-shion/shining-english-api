spring.application.name=shiningenglishapi

spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:shining_english}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci
spring.datasource.username=${MYSQL_USER:shining}
spring.datasource.password=${MYSQL_PASSWORD:135792468jK}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES utf8mb4 COLLATE utf8mb4_unicode_ci
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

springdoc.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

recaptcha.secret=${RECAPTCHA_SECRET:}
recaptcha.register_action=${RECAPTCHA_REGISTER_ACTION:register}
recaptcha.contact_action=${RECAPTCHA_CONTACT_ACTION:contact}

app.url=${APP_URL:http://localhost:8000}

star.daily_checkin=${STAR_DAILY_CHECKIN:1}
star.registration_bonus=${STAR_REGISTRATION_BONUS:15}
star.course_complete=${STAR_COURSE_COMPLETE:10}

pagination.default_per_page=${PAGINATION_DEFAULT_PER_PAGE:15}

dashboard.goals.daily_lessons=${DASHBOARD_GOALS_DAILY_LESSONS:2}
dashboard.goals.daily_study_minutes=${DASHBOARD_GOALS_DAILY_STUDY_MINUTES:5}
dashboard.goals.focus_courses=${DASHBOARD_GOALS_FOCUS_COURSES:2}
dashboard.goals.streak_days=${DASHBOARD_GOALS_STREAK_DAYS:7}

spring.jackson.property-naming-strategy=SNAKE_CASE
