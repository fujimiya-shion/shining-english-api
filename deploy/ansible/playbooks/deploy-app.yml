---
- name: Deploy Shining English API
  hosts: app_server
  become: yes
  vars_files:
    - ../inventory/group_vars/vault_db.yml
    - ../inventory/group_vars/vault_payos.yml
    - ../inventory/group_vars/vault_recaptcha.yml
  tasks:
    - name: Login to DockerHub
      community.docker.docker_login:
        username: "{{ vault_dockerhub_username }}"
        password: "{{ vault_dockerhub_token }}"

    - name: Pull new image
      community.docker.docker_image:
        name: "{{ docker_registry }}/{{ app_name }}:{{ lookup('env', 'APP_TAG') }}"
        source: pull

    - name: Deploy docker-stack.yml
      ansible.builtin.template:
        src: app/docker-stack.yml.j2
        dest: /opt/app/docker-stack.yml
        mode: "0644"

    - name: Deploy env file
      ansible.builtin.template:
        src: app/env.prod.j2
        dest: /opt/app/.env.prod
        mode: "0600"

    - name: Deploy stack
      community.docker.docker_stack:
        state: present
        name: shiningenglish
        compose:
          - /opt/app/docker-stack.yml
        resolve_image: always

    - name: Force service update
      ansible.builtin.command:
        cmd: docker service update --force --update-order start-first shiningenglish_app
      register: update_result
      changed_when: "'updated' in update_result.stdout"

    - name: Wait for stack to stabilize
      ansible.builtin.pause:
        seconds: 15

    - name: Verify all replicas are running
      community.docker.docker_stack_info:
        name: shiningenglish
      register: stack_info
      retries: 10
      delay: 5
      until: >
        stack_info.services | default([]) |
        selectattr('name', 'equalto', 'shiningenglish_app') |
        map(attribute='replicas_current') | first | default(0) | int >= app_replicas
