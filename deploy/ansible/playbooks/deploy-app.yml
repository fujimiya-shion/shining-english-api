---
- name: Deploy Shining English API
  hosts: app_server
  vars_files:
    - ../inventory/group_vars/vault_db.yml
    - ../inventory/group_vars/vault_dockerhub.yml
    - ../inventory/group_vars/vault_payos.yml
    - ../inventory/group_vars/vault_recaptcha.yml
  tasks:
    - name: Login to DockerHub
      ansible.builtin.command:
        cmd: docker login -u "{{ vault_dockerhub_username }}" -p "{{ vault_dockerhub_token }}"
      no_log: true

    - name: Pull new image
      ansible.builtin.command:
        cmd: docker pull "{{ docker_registry }}/{{ app_name }}:{{ lookup('env', 'APP_TAG') }}"

    - name: Deploy docker-stack.yml
      ansible.builtin.template:
        src: ../roles/app/templates/docker-stack.yml.j2
        dest: "{{ app_stack_file }}"
        mode: "0644"

    - name: Deploy env file
      ansible.builtin.template:
        src: ../roles/app/templates/env.prod.j2
        dest: "{{ app_env_file }}"
        mode: "0600"

    - name: Deploy stack
      ansible.builtin.command:
        cmd: docker stack deploy -c "{{ app_stack_file }}" shiningenglish
      register: stack_deploy
      changed_when: "'created' in stack_deploy.stdout or 'updated' in stack_deploy.stdout"

    - name: Force service update
      ansible.builtin.command:
        cmd: docker service update --force --update-order start-first shiningenglish_api
      register: update_result
      changed_when: "'updated' in update_result.stdout"

    - name: Wait for stack to stabilize
      ansible.builtin.pause:
        seconds: 15

    - name: Verify all replicas are running
      ansible.builtin.shell:
        cmd: docker stack services shiningenglish --format '{{ "{{" }}.Replicas{{ "}}" }}' | grep -o '^[0-9]\+' | head -1
      register: replicas
      retries: 10
      delay: 5
      until: replicas.stdout | int >= app_replicas
