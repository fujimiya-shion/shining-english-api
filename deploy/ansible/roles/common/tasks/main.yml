---
- name: Update apt cache
  ansible.builtin.shell:
    cmd: apt-get update --allow-releaseinfo-change -y
    executable: /bin/bash
  changed_when: false

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - ufw
      - fail2ban
      - unzip
      - python3-pip
    state: present

- name: Set timezone to Asia/Ho_Chi_Minh
  ansible.builtin.timezone:
    name: Asia/Ho_Chi_Minh

- name: Configure UFW rules
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"
    - "80"
    - "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled
