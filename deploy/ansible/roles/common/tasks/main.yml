---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - htop
      - ufw
      - fail2ban
      - unzip
      - python3-pip
    state: present

- name: Set timezone to Asia/Ho_Chi_Minh
  ansible.builtin.timezone:
    name: Asia/Ho_Chi_Minh

- name: Configure UFW defaults
  community.general.ufw:
    direction: "{{ item.dir }}"
    policy: "{{ item.pol }}"
  loop:
    - { dir: incoming, pol: deny }
    - { dir: outgoing, pol: allow }

- name: Configure UFW rules
  community.general.ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop:
    - "22"
    - "80"
    - "443"

- name: Enable UFW
  community.general.ufw:
    state: enabled
