---
- name: Create deploy directory
  ansible.builtin.file:
    path: "{{ app_deploy_dir }}"
    state: directory
    mode: "0755"

- name: Deploy docker-stack.yml
  ansible.builtin.template:
    src: docker-stack.yml.j2
    dest: "{{ app_stack_file }}"
    mode: "0644"

- name: Deploy env file
  ansible.builtin.template:
    src: env.prod.j2
    dest: "{{ app_env_file }}"
    mode: "0600"


