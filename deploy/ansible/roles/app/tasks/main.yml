---
- name: Create deploy directory
  ansible.builtin.file:
    path: /opt/app
    state: directory
    mode: "0755"

- name: Deploy docker-stack.yml
  ansible.builtin.template:
    src: docker-stack.yml.j2
    dest: /opt/app/docker-stack.yml
    mode: "0644"

- name: Deploy env file
  ansible.builtin.template:
    src: env.prod.j2
    dest: /opt/app/.env.prod
    mode: "0600"

- name: Deploy initial stack
  community.docker.docker_stack:
    state: present
    name: shiningenglish
    compose:
      - /opt/app/docker-stack.yml
    resolve_image: always

- name: Wait for stack to stabilize
  ansible.builtin.pause:
    seconds: 10
