---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release | lower }} stable"
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Install Python Docker SDK
  ansible.builtin.pip:
    name:
      - docker
      - jsondiff
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

- name: Initialize Docker Swarm
  ansible.builtin.command:
    cmd: docker swarm init --advertise-addr "{{ ansible_default_ipv4.address }}"
  failed_when: false
  changed_when: false

- name: Get Swarm worker token
  ansible.builtin.command: docker swarm join-token -q worker
  register: swarm_token
  changed_when: false
  failed_when: false

- name: Show swarm token
  ansible.builtin.debug:
    msg: "Swarm worker token: {{ swarm_token.stdout }}"
