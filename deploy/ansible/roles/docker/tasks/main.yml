---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Remove existing Docker GPG keyring if present
  ansible.builtin.file:
    path: /etc/apt/keyrings/docker.asc
    state: absent

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /etc/apt/keyrings/docker.gpg
    state: present

- name: Remove conflicting Docker source files
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/apt/sources.list.d/docker.list
    - /etc/apt/sources.list.d/docker.sources

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] | lower }} stable"
    state: present
    filename: docker
    update_cache: no

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Install Python Docker SDK
  ansible.builtin.pip:
    name:
      - docker
      - jsondiff
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

- name: Initialize Docker Swarm (if not already)
  ansible.builtin.command:
    cmd: docker swarm init --advertise-addr "{{ ansible_default_ipv4.address }}"
  register: swarm_init
  changed_when: "'is initialized' in swarm_init.stdout"
  ignore_errors: yes

- name: Get swarm worker join token
  ansible.builtin.command:
    cmd: docker swarm join-token worker
  register: swarm_token_output
  changed_when: false
  when: swarm_init.rc == 0 or swarm_init.rc == 1

- name: Read current token from vault (without modifying file)
  ansible.builtin.command:
    cmd: >
      ansible-vault decrypt
      --output -
      --vault-password-file {{ playbook_dir }}/../.vault_pass
      {{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml
  register: vault_content
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined
  changed_when: false

- name: Check if token already exists
  ansible.builtin.set_fact:
    existing_token: "{{ (vault_content.stdout | from_yaml).vault_swarm_join_token | default('') }}"
  when: swarm_token_output.skipped is not defined

- name: Decrypt vault file for writing
  ansible.builtin.command:
    cmd: >
      ansible-vault decrypt
      --vault-password-file {{ playbook_dir }}/../.vault_pass
      {{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined and (existing_token | default('')) == ''

- name: Store swarm join token in vault
  ansible.builtin.lineinfile:
    path: "{{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml"
    regexp: '^vault_swarm_join_token:.*'
    line: "vault_swarm_join_token: {{ swarm_token_output.stdout_lines[-1] | regex_search('SWMTKN-[\\w-]+') }}"
    mode: '0600'
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined and (existing_token | default('')) == ''

- name: Re-encrypt vault file
  ansible.builtin.command:
    cmd: >
      ansible-vault encrypt
      --vault-password-file {{ playbook_dir }}/../.vault_pass
      {{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined and (existing_token | default('')) == ''
