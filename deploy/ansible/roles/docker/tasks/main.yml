---
- name: Install prerequisite packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - gnupg
      - lsb-release
    state: present

- name: Add Docker GPG key
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

- name: Add Docker repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release | lower }} stable"
    state: present

- name: Install Docker
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

- name: Install Python Docker SDK
  ansible.builtin.pip:
    name:
      - docker
      - jsondiff
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: yes
    state: started

- name: Initialize Docker Swarm (if not already)
  ansible.builtin.command:
    cmd: docker swarm init --advertise-addr "{{ ansible_default_ipv4.address }}"
  register: swarm_init
  changed_when: "'is initialized' in swarm_init.stdout"
  ignore_errors: yes

- name: Get swarm worker join token
  ansible.builtin.command:
    cmd: docker swarm join-token worker
  register: swarm_token_output
  changed_when: false
  when: swarm_init.rc == 0 or swarm_init.rc == 1

- name: Decrypt vault file
  ansible.builtin.command:
    cmd: >
      ansible-vault decrypt
      --vault-password-file {{ playbook_dir }}/../.vault_pass
      {{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined
  register: vault_decrypt
  changed_when: false

- name: Read current token from vault
  ansible.builtin.slurp:
    src: "{{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml"
  register: vault_content
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined

- name: Check if token already exists
  ansible.builtin.set_fact:
    existing_token: "{{ (vault_content.content | b64decode | from_yaml).vault_swarm_join_token | default('') }}"
  when: swarm_token_output.skipped is not defined

- name: Store swarm join token in vault
  ansible.builtin.lineinfile:
    path: "{{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml"
    regexp: '^vault_swarm_join_token:.*'
    line: "vault_swarm_join_token: {{ swarm_token_output.stdout_lines[-1] | regex_search('SWMTKN-[\\w-]+') }}"
    mode: '0600'
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined and (existing_token | default('')) == ''

- name: Re-encrypt vault file
  ansible.builtin.command:
    cmd: >
      ansible-vault encrypt
      --vault-password-file {{ playbook_dir }}/../.vault_pass
      {{ playbook_dir }}/../inventory/group_vars/vault_swarm_token.yml
  delegate_to: localhost
  become: no
  when: swarm_token_output.skipped is not defined
