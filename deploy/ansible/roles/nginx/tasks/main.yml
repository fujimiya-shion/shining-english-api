---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Install Certbot
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot-nginx
    state: present

- name: Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
  notify: Reload Nginx

- name: Deploy upstream config
  ansible.builtin.template:
    src: upstream.conf.j2
    dest: /etc/nginx/conf.d/shiningenglish.conf
    mode: "0644"
  notify: Reload Nginx

- name: Deploy SSL config
  ansible.builtin.template:
    src: ssl.conf.j2
    dest: /etc/nginx/conf.d/shiningenglish-ssl.conf
    mode: "0644"
  notify: Reload Nginx

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command:
    cmd: certbot --nginx -d {{ nginx_backend_domain }} --non-interactive --agree-tos -m {{ nginx_ssl_email }}
  args:
    creates: /etc/letsencrypt/live/{{ nginx_backend_domain }}/fullchain.pem

- name: Enable sites
  ansible.builtin.file:
    src: /etc/nginx/sites-available/default
    dest: /etc/nginx/sites-enabled/default
    state: link
  notify: Reload Nginx
