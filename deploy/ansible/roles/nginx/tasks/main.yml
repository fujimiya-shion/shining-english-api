---
- name: Install Nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Install Certbot
  ansible.builtin.apt:
    name:
      - certbot
      - python3-certbot
    state: present

- name: Remove old shiningenglish SSL config if present
  ansible.builtin.file:
    path: /etc/nginx/conf.d/shiningenglish-ssl.conf
    state: absent
  notify: Reload Nginx

- name: Deploy nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    mode: "0644"
  notify: Reload Nginx

- name: Deploy upstream config
  ansible.builtin.template:
    src: upstream.conf.j2
    dest: /etc/nginx/conf.d/shiningenglish.conf
    mode: "0644"
  notify: Reload Nginx

- name: Ensure webroot exists
  ansible.builtin.file:
    path: /var/www/html
    state: directory
    mode: "0755"

- name: Obtain Let's Encrypt certificate
  ansible.builtin.command:
    cmd: certbot certonly --webroot -w /var/www/html -d {{ nginx_backend_domain }} --non-interactive --agree-tos -m {{ nginx_ssl_email }}
  args:
    creates: /etc/letsencrypt/live/{{ nginx_backend_domain }}/fullchain.pem
  ignore_errors: yes

- name: Check if SSL certificate exists
  ansible.builtin.stat:
    path: /etc/letsencrypt/live/{{ nginx_backend_domain }}/fullchain.pem
  register: nginx_ssl_cert

- name: Deploy SSL config
  ansible.builtin.template:
    src: ssl.conf.j2
    dest: /etc/nginx/conf.d/shiningenglish-ssl.conf
    mode: "0644"
  notify: Reload Nginx
  when: nginx_ssl_cert.stat.exists
