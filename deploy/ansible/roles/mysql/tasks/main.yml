---
- name: Check if MySQL is already installed
  ansible.builtin.command: mysql --version
  register: mysql_check
  changed_when: false
  failed_when: false

- name: Install MySQL
  ansible.builtin.apt:
    name:
      - mysql-server
      - mysql-client
      - python3-pymysql
    state: present
  when: mysql_check.rc != 0

- name: Start and enable MySQL
  ansible.builtin.systemd:
    name: mysql
    state: started
    enabled: yes

- name: Deploy my.cnf with bind-address 0.0.0.0
  ansible.builtin.template:
    src: my.cnf.j2
    dest: /etc/mysql/mysql.conf.d/99-shining.cnf
    mode: "0644"
  register: mysql_config

- name: Restart MySQL if config changed
  ansible.builtin.systemd:
    name: mysql
    state: restarted
  when: mysql_config.changed

- name: Ensure MySQL is running
  ansible.builtin.systemd:
    name: mysql
    state: started

- name: Allow MySQL port 3306 in UFW
  community.general.ufw:
    rule: allow
    port: "3306"
    proto: tcp

- name: Create app database
  community.mysql.mysql_db:
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    login_host: 127.0.0.1
    name: "{{ app_mysql_database }}"
    state: present
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci

- name: Create app user with remote access
  community.mysql.mysql_user:
    login_user: root
    login_password: "{{ vault_mysql_root_password }}"
    login_host: 127.0.0.1
    name: "{{ app_mysql_user }}"
    password: "{{ vault_mysql_app_password }}"
    host: "{{ item }}"
    priv: "{{ app_mysql_database }}.*:ALL"
    state: present
  loop:
    - localhost
    - 127.0.0.1
    - "%"
    - "{{ ansible_default_ipv4.address }}"
